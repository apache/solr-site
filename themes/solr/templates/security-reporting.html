{% extends "subnav.html" %}

{% block subnav_title %}Vulnerability Reporting Procedure{% endblock %}
{% block subnav_nav_items %}
<dd><a href="{{ SITEURL }}/security.html">Security</a></dd>
<dd><a href="{{ SITEURL }}/security-reporting.html" class="selected">Vulnerability Reporting Procedure</a></dd>
<dd><a href="{{ SITEURL }}/security-dependency-cves.html">CVE Status for Dependencies</a></dd>
{% endblock %}

{% block content_inner %}
<div class="small-12 columns">
  <style type="text/css">
    .headerlink, .elementid-permalink {
      visibility: hidden;
    }
    h2:hover > .headerlink, h3:hover > .headerlink, h1:hover > .headerlink, h6:hover > .headerlink, h4:hover > .headerlink, h5:hover > .headerlink, dt:hover > .elementid-permalink {
      visibility: visible;
    }
    details {
      border: 1px solid #ddd;
      border-radius: 4px;
      margin-bottom: 1em;
      padding: 0;
    }
    summary {
      background: #f5f5f5;
      cursor: pointer;
      font-weight: bold;
      padding: 0.75em 1em;
      border-radius: 4px;
    }
    details[open] summary {
      border-bottom: 1px solid #ddd;
      border-radius: 4px 4px 0 0;
    }
    details pre {
      background: #fafafa;
      border: none;
      margin: 0;
      padding: 1em 1.5em;
      white-space: pre-wrap;
      font-size: 0.9em;
    }
    .workflow-figure {
      margin: 2em 0;
    }
    .workflow-figure img {
      width: 100%;
      height: auto;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
    }
    .workflow-figure figcaption {
      color: #666;
      font-size: 0.9em;
      margin-top: 0.5em;
    }
  </style>
  {{ page.content }}
</div>
{% endblock content_inner %}
